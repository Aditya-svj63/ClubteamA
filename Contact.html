<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Feedback | Teoler Unbounded</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand: #0052FF;
            --brand-light: #EBF2FF;
            --bg-light: #F4F7FA;
            --text-main: #1A1F2B;
            --text-sub: #5E6777;
            --white: #ffffff;
            --error: #ff4757;
            --success: #2ed573;
        }
           .nav-logo-group { display: flex; align-items: center; gap: 15px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* FLOATING NAVIGATION (Consistent with other pages) */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(3px);
            padding: 15px 40px;
            border-radius: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.2rem; }
        .nav-links a { text-decoration: none; color: var(--text-main); font-weight: 500; margin-left: 25px; transition: 0.3s; }
        .nav-links a:hover { color: var(--brand); }

        /* CONTACT HEADER */
        .contact-hero {
            padding: 160px 10% 40px;
            text-align: center;
        }

        .contact-hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        /* FORM CARD */
        .container {
            max-width: 800px;
            margin: 0 auto 100px;
            padding: 0 20px;
        }

        .contact-card {
            background: var(--white);
            padding: 60px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }

        .contact-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 50px;
        }

        .method-box {
            background: var(--bg-light);
            padding: 25px;
            border-radius: 24px;
            text-align: center;
        }

        .method-box h4 { font-family: 'Space Grotesk', sans-serif; color: var(--brand); margin-bottom: 5px; }
        .method-box p { font-weight: 700; font-size: 1.1rem; }

        /* FEEDBACK SECTION */
        .feedback-label {
            display: block;
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .feedback-options {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .feedback-options input[type="radio"] {
            display: none;
        }

        .option-tile {
            flex: 1;
            padding: 30px;
            border: 2px solid #eee;
            border-radius: 24px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: white;
        }

        .option-tile span {
            display: block;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .option-tile b { font-family: 'Space Grotesk', sans-serif; }

        .option-tile:hover {
            border-color: var(--brand);
            background: var(--brand-light);
        }

        /* Styling for when radio is checked */
        input[type="radio"]:checked + .option-tile {
            border-color: var(--brand);
            background: var(--brand);
            color: white;
            transform: scale(1.05);
        }

        .submit-btn {
            width: 100%;
            background: var(--text-main);
            color: white;
            padding: 20px;
            border: none;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            transition: 0.3s;
        }
        img {
            width: 100px;
            height: 55px;
            align-items: center;
            justify-content: center;
            color: #7f8c8d;
            font-size: 12px;
            font-weight: bold;
        }

        .submit-btn:hover {
            background: var(--brand);
            box-shadow: 0 10px 20px rgba(0, 82, 255, 0.2);
            transform: translateY(-2px);
        }

        footer { text-align: center; padding-bottom: 60px; color: var(--text-sub); }

    </style>
</head>
<body>

<nav>
     <div class="nav-logo-group"><img src ="Teoler-Unbounded-Logo-Transparent.png" alt="School Logo"></img><div class="logo">TEOLER UNBOUNDED</div></div>
    <div class="nav-links">
        <a href="Homepage(Main).html">Home</a>
        <a href="Gallery.html">Gallery</a>
        <a href="About.html" >About</a>
        <a href="Contact.html">Contact</a>
    </div>
</nav>

<section class="contact-hero">
    <h1>Get in <span style="color: var(--brand)">Touch.</span></h1>
    <p style="color: var(--text-sub); max-width: 600px; margin: 0 auto;">Have questions about a club or want to provide feedback? Our team is ready to help.</p>
</section>

<div class="container">
    <div class="contact-card">
        <div class="contact-methods">
            <div class="method-box">
                <h4>Call Us</h4>
                <p>+91 1801202323</p>
            </div>
            <div class="method-box">
                <h4>Support</h4>
                <p>+91 3232021081</p>
            </div>
        </div>

        <form action="#" onsubmit="alert('Thank you for your feedback!'); return false;">
            <label class="feedback-label">How is your experience so far?</label>

            <div class="feedback-options">
                <label style="flex: 1;">
                    <input type="radio" name="feedback" value="good" required>
                    <div class="option-tile">
                        <span>🚀</span>
                        <b>LOVED IT</b>
                    </div>
                </label>

                <label style="flex: 1;">
                    <input type="radio" name="feedback" value="bad" required>
                    <div class="option-tile">
                        <span>🛠️</span>
                        <b>NEEDS WORK</b>
                    </div>
                </label>
            </div>

            <button type="submit" class="submit-btn">Send Feedback</button>
        </form>
    </div>
</div>

<footer>
    <p>© 2026 Binary Club Team-A | Teoler Unbounded</p>
</footer>

</body>
</html>
